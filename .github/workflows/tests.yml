name: Tests
on:
  - push
  - pull_request

jobs:
  build-microceph:
    name: Build microceph snap
    runs-on: ubuntu-22.04
    env:
      SNAPCRAFT_BUILD_ENVIRONMENT: "lxd"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Copy utils
        run: cp tests/scripts/actionutils.sh $HOME

      - name: Clear FORWARD firewall rules
        run: ~/actionutils.sh cleaript

      - name: Install dependencies
        run: |
          ~/actionutils.sh setup_lxd

          sudo snap install snapcraft --classic
          snap list

      - name: Cache snap artifact
        id: snap-cache
        uses: actions/cache@v4
        with:
          path: "*.snap"
          key: snap-${{ hashFiles('snap/**', 'microceph/**', 'microceph-orch/**', 'snapcraft/**', 'patches/**') }}

      - name: Build snaps
        if: steps.snap-cache.outputs.cache-hit != 'true'
        run: snapcraft

      - name: Upload snap artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snaps
          path: "*.snap"
          retention-days: 5

  dsl-baseline-tests:
    name: DSL baseline tests
    runs-on: ubuntu-22.04
    needs: build-microceph
    steps:
      - name: Download snap
        uses: actions/download-artifact@v4
        with:
          name: snaps
          path: /home/runner
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Clear FORWARD firewall rules
        run: |
          sudo iptables -P FORWARD ACCEPT || true
          sudo ip6tables -P FORWARD ACCEPT || true
          sudo iptables -F FORWARD || true
          sudo ip6tables -F FORWARD || true
      - name: Free runner disk
        run: |
          sudo rm -rf /usr/local/lib/android /usr/local/.ghcup
          imgs=$(sudo docker images -q 2>/dev/null || true)
          [ -n "$imgs" ] && sudo docker rmi $imgs || true
      - name: Initialize LXD
        run: |
          sudo snap list lxd 2>/dev/null || sudo snap install lxd --channel=latest/stable
          sudo snap set lxd daemon.group=adm
          sudo lxd init --auto
      - name: Install Robot Framework
        run: pip3 install -r tests/robot/requirements.txt
      - name: Run DSL baseline tests
        run: python3 tests/robot/robot.py --test-suite dsl-functional-tests --snap-path '/home/runner/*.snap' --variable XTRACE:True --test "Run DSL Baseline Tests"
      - name: Upload Robot logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-logs-dsl-baseline-tests
          path: |
            output.xml
            log.html
            report.html
          retention-days: 5

